<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Modifier une acquisition</title>

<link rel="stylesheet" href="CSS/Style.css">

<script>
function confirmDelete(){
return confirm("Êtes-vous sûr de vouloir supprimer définitivement l'acquisition ?");
}
</script>

</head>

<body>

<h1 class="stats">Modifier une acquisition</h1>

<table style="width:100%; font-weight:bold">

<tr>

<td>Type d'acquisition :</td>
<td>
<select>
<option>Marché</option>
<option>Bon de commande</option>
</select>
</td>

<td>Code :</td>
<td>
<input type="text">
</td>

<td>Montant Globale :</td>
<td>
<input type="text"> MAD
</td>

</tr>

<tr>

<td>Nombre de lots :</td>
<td>
<input type="text">
<span style="color:red"></span>
</td>

<td>Date :</td>
<td>
<input type="date">
</td>

</tr>

</table>

<br>

<center>

<button>Modifier</button>
<button>Ajouter Lot</button>
<button onclick="confirmDelete()">Supprimer</button>

</center>

</body>

</html>
